{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card bg-dark text-white border-secondary p-4">
                <h2 class="text-center mb-4">Iniciar Sesión</h2>
                
                <form action="/login" method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" name="email" class="form-control bg-black text-white border-secondary" placeholder="correo@gmail.com" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control bg-black text-white border-secondary" placeholder="ingresa tu contraseña" required>
                    </div>

                    <button type="submit" class="btn btn-light w-100 fw-bold">Entrar</button>
                    
                </form>

                <div class="text-center mt-3">
                    <small class="text-secondary">¿No tienes cuenta? ve y <a href="/register" class="text-white">Regístrate</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
