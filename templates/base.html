<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invernadero Virtual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='img/css/style.css') }}">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-white shadow-sm mb-4 py-3">
  <div class="container-fluid d-flex justify-content-between align-items-center position-relative">
    
    <a class="navbar-brand m-0" href="{{ url_for('index') }}">
        <i class="bi bi-tree-fill text-success"></i>
    </a>

    <h3 class="position-absolute top-50 start-50 translate-middle m-0 fw-bold fs-5 fs-md-3 text-dark">
      Mi Invernadero Virtual
    </h3>

    <div class="ms-auto">
      {% if session.get('usuario_nombre') %}
        <div class="dropdown">
          <button class="btn border-danger text-danger dropdown-toggle shadow-sm" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person-circle"></i> {{ session.get('usuario_nombre') }}
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow border-0">
            <li><h6 class="dropdown-header">Usuario: {{ session.get('usuario_nombre') }}</h6></li>
            <li><hr class="dropdown-divider"></li>
            <li>
                <a class="dropdown-item text-danger d-flex align-items-center" href="{{ url_for('logout') }}">
                    <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
                </a>
            </li>
          </ul>
        </div>
      {% else %}
        <a href="{{ url_for('login') }}" class="btn btn-guinda shadow-sm me-2">Iniciar Sesión</a>
        <a href="{{ url_for('registro') }}" class="btn btn-guinda shadow-sm d-none d-sm-inline-block">Regístrate</a>
      {% endif %}
    </div>
  </div>
</nav>

<main>
    {% block content %}{% endblock %} 
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
