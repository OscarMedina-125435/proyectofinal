<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}EnviaFlores{% endblock %}</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- ENLACE A TU CARPETA DE STYLE -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand navbar-dark navbar-envia">
        <div class="container-fluid">
            <!-- Logo -->
            <a class="navbar-brand-custom" href="/">
                <div class="logo-circle-wrapper">
                    <i class="bi bi-flower1"></i>
                </div>
                <span>enviaflores</span>
            </a>

            <!-- Iconos basados en edited-image.png -->
            <div class="nav-actions-wrapper ms-auto">
                <a href="#" class="nav-icon-link"><i class="bi bi-search"></i></a>
                <a href="#" class="nav-icon-link"><i class="bi bi-person"></i></a>
                <a href="#" class="nav-icon-link"><i class="bi bi-cart3"></i></a>
            </div>
        </div>
    </nav>

    <main class="container main-layout-container">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
