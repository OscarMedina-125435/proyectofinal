<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}EnviaFlores{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand navbar-dark navbar-envia">
        <div class="container-fluid">
            <!-- Logo -->
            <a class="navbar-brand-custom" href="/">
                <div class="logo-circle-wrapper">
                    <i class="bi bi-flower1"></i>
                </div>
                <span>enviaflores</span>
            </a>
<div class="auth-links me-3">
        <a href="{{ url_for('login') }}" class="btn btn-sm btn-outline-light me-2">Iniciar Sesión</a>
        <a href="{{ url_for('register') }}" class="btn btn-sm btn-light text-primary fw-bold">Registrarse</a>
    </div>
           
    </nav>

    <main class="container main-layout-container">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
