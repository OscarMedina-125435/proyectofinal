<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestor de Tareas{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Tu archivo CSS externo -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-black text-white">

    <nav class="navbar navbar-expand navbar-dark fixed-top custom-navbar">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Logo" class="brand-logo">
                <span class="fw-bold">Rutina Diaria</span>
            </a>

            <div class="navbar-nav me-auto align-items-center">
                <a class="nav-link" href="/"><i class="bi bi-clipboard-check"></i></a>
                
                {% if session.get('user_id') %}
                    <span class="nav-link user-badge me-3">
                        <i class="bi bi-person me-1"></i>{{ session.get('nombre') }}
                    </span>
                    
                    <a class="nav-link text-danger logout-icon" href="{{ url_for('logout') }}" title="Cerrar Sesión">
                        <i class="bi bi-box-arrow-right"></i>
                    </a>
                {% endif %}
            </div>

            <div class="d-flex gap-2">
                {% if not session.get('user_id') %}
                    <a href="/login" class="btn btn-sm btn-login px-3">Log in</a>
                    <a href="/register" class="btn btn-sm btn-signup fw-bold px-3">Sign up</a>
                {% else %}
                    <a href="/perfil" class="btn btn-sm btn-profile px-3">Mi Perfil</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container-fluid">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
