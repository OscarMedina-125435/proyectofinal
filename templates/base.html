<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='img/css/style.css') }}">


</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-danger-subtle shadow-sm mb-4 py-4">
  <div class="container-fluid d-flex justify-content-between align-items-center position-relative">
    <a class="navbar-brand m-0" href="/"></a>

    <h3 class="position-absolute top-50 start-50 translate-middle m-0 fw-bold">
      Mi agenda de tareas
    </h3>

    <div class="ms-auto">
      {% if session.get('usuario_nombre') %}
        <div class="dropdown d-inline">
          <button class="btn bg-danger-subtle border-danger dropdown-toggle" type="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle"></i> {{ session.get('usuario_nombre') }}
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#">Perfil</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="{{ url_for('logout') }}">Cerrar Sesión</a></li>
          </ul>
        </div>
      {% else %}
        <a href="{{ url_for('login') }}" class="btn bg-danger-subtle border-danger shadow-sm me-2">Iniciar Sesión</a>
        <a href="{{ url_for('registro') }}" class="btn bg-warning-subtle border-danger shadow-sm">Regístrate</a>
      {% endif %}
    </div>
  </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<main>
    {% block content %}{% endblock %} 
</main>
      
</body>
</html>
