{% extends "base.html" %}

{% block title %}Crear Cuenta{% endblock %}

{% block content %}

<div class="registro-container">
    <div class="col-md-5 mx-auto">
        <div class="card card-registro">
            <div class="registro-header text-center"> <img src="{{ url_for('static', filename='img/m.jpeg') }}"
                    class="rounded-circle mb-2 border border-2 border-white object-fit-cover" alt="Perfil" width="70"
                    height="70">
            </div>
        </div>
    </div>
</div>
<div class="container">
    <div class="row justify-content-center">
        <h3 class="mb-0">Regístrate</h3>
        <small>Únete a tu agenda personal</small>
    </div>

    <div class="card-body p-4">
        <form action="/registro" method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Nombre de Usuario</label>
                <input type="text" name="usuario" class="form-control form-control-custom" placeholder="usuario"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Tu mejor Email</label>
                <input type="email" name="email" class="form-control form-control-custom"
                    placeholder="ejemplo@correo.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Contraseña</label>
                <input type="password" name="password" class="form-control form-control-custom" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-registro">
                    ¡Comenzar ahora!
                </button>
            </div>
        </form>
<p class="small text-muted">¿Ya tienes cuenta? 
    <a href="{{ url_for('login') }}" class="text-primary">Inicia sesión</a>
</p>
