{% extends "base.html" %}
{% block title %}Mi Invernadero | Sugerencias{% endblock %}
{% block content %}

<div class="sugerencia-container">
  
  <button type="button" class="btn-sugerencia-trigger" data-bs-toggle="collapse" data-bs-target="#colapsoSugerencia" aria-expanded="false" aria-controls="colapsoSugerencia">
    <span class="icono-sugerencia">💡</span>
    <span class="texto-sugerencia">Sugerir una planta</span>
  </button>

  <div class="collapse" id="colapsoSugerencia">
    <div class="tarjeta-sugerencia">
      
      <div class="tarjeta-header">
        <div class="tarjeta-titulo-grupo">
          <span class="icono-titulo">🌺</span>
          <h5 class="tarjeta-titulo">¿Qué planta nos falta?</h5>
        </div>
        <button type="button" class="btn-cerrar-sugerencia" data-bs-toggle="collapse" data-bs-target="#colapsoSugerencia" aria-label="Close">×</button>
      </div>
      
      <div class="tarjeta-body">
        <p class="descripcion-sugerencia">Ayúdanos a expandir el invernadero. Cuéntanos qué especie te gustaría ver en el catálogo y el administrador la revisará.</p>
        
        <form action="/sugerencia" method="POST" class="formulario-sugerencia">
          <input type="hidden" name="accion" value="crear">
          
          <div class="grupo-input">
            <input type="text" id="nombrePlanta" name="nombre_planta" placeholder=" " required class="input-sugerencia">
            <label for="nombrePlanta" class="label-sugerencia">Nombre de la Planta</label>
          </div>
          
          <div class="grupo-botones">
            <button type="button" class="btn-cancelar" data-bs-toggle="collapse" data-bs-target="#colapsoSugerencia">
              Cancelar
            </button>
            <button type="submit" class="btn-enviar">
              Enviar al Admin
            </button>
          </div>
        </form>
      </div>

    </div>
  </div>

</div>

{% endblock %}
